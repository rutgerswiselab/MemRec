# MemRec v2 configuration for InstructRec-Books dataset
# v2 features: Three-stage pipeline (R → ReRank → W), Parametric Pruner, Flexible Reranker

# Inherit common settings
_base_: common.yaml

model: memrec_agent
dataset: instructrec-books
seed: 42

# Evaluation settings
n_eval_candidates: 10
# n_eval_users: 100  # Commented out - evaluate on ALL test users by default
topk: [1, 3, 5, 10]
metrics: ['Hit', 'NDCG']  # Also computes MRR automatically

# Eval feedback mode
eval_feedback: gt  # gt | random | none

# Training settings (simulate memory construction before test)
warmup:
  enabled: true      # Enable training rounds
  rounds: 1          # Number of training rounds (1 or 3)
                     # rounds=1: Use T-1 as target (History: 1 to T-2)
                     # rounds=3: Use T-3, T-2, T-1 as targets sequentially

# LLM/Provider settings
llm_model: "gpt-4o-mini"
api_version: "2024-08-01-preview"
# api_endpoint and api_key should be set via environment variables:
# AZURE_OPENAI_ENDPOINT and AZURE_OPENAI_API_KEY

# Provider config (v2: supports multiple providers for different stages)
provider:
  name: azure_openai  # or qwen, llama, etc.
  model: gpt-4o-mini
  endpoint: ${ENV:AZURE_OPENAI_ENDPOINT}
  api_key: ${ENV:AZURE_OPENAI_API_KEY}

# MemRec specific parameters (v2: three-stage)
memrec:
  # Stage-R (Retrieval) settings
  k: 16                      # Total neighbors to select
  tau_tokens: 1800           # Token budget for context packing
  mix_min_users: 4           # Minimum user neighbors (mixing constraint)
  mix_min_items: 6           # Minimum item neighbors (mixing constraint)
  n_facets: 7                # Number of facets to request from LLM
  temperature: 0.0           # LLM sampling temperature (0 = greedy)
  max_tokens: 4000
  
  # Pruner configuration (v2)
  pruner:
    mode: llm_rules          # "hybrid_rule", "learned_mlp", or "llm_rules" (default: llm_rules)
    checkpoint: null         # Path to MLP checkpoint (required for learned_mlp mode)
    # diversity_lambda: 0.2  # (future) diversity penalty weight
  
  # Pruner weights (for hybrid_rule mode)
  item_weight: 1.0           # Weight for item neighbors
  user_weight: 0.5           # Weight for user neighbors
  recency_weight: 0.5        # Weight for recency feature
  degree_weight: 0.3         # Weight for degree feature
  overlap_weight: 0.7        # Weight for overlap feature
  
  # Reranker configuration (v2)
  reranker_mode: llm      # "vector" (fast, no LLM) or "llm" (accurate, uses LLM)
  
  # Stage-W (Write) settings
  write:
    fanout_cap: 8            # Maximum neighbor patches to apply
    max_tokens: 4000

# Debug (can be overridden by command line --debug)
debug: false
